<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CSS</title>
</head>
<body>
    <div class="container">
         <h1>Vendas na Harry Ploter</h1>

         <p>Total de vendas: R$ <span id="total-vendas">0.00</span></p>
         <div class="input-group">
            <label for="valor-venda">Valor da Venda R$</label>
            <input type="number" id="valor-venda" step="0.01" placeholder="0.00">
            <button onclick="cadastrarVenda()">Cadastrar</button>
         </div>
    </div>

    <div class="desafios-section">
        <h3></h3>
        <button class="btn-desfazer" onclick="desfazerUltimaVenda()">Desfazer último lançamento ↩️</button>
        
        <h4>Histórico de Vendas:</h4>
        <ul id="lista-vendas">
            </ul>
    </div>

    <script src="script.js"></script>
</body>
