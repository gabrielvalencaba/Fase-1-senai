<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CSS</title>
</head>
<body>
    <h1>Variaveis</h1>

<hr>
<h2>Jogo do Dino 🎰🦖🦕</h2>

<label for="inputAposta">Aposta da dona Bete: R$ </label>
<input type="number" id="inputAposta" min="0.01" step="0.01" placeholder="0.00">

<br><br>

<button onclick="ApostaDino('Espinossauro')">Espinossauro</button>
<button onclick="ApostaDino('Velocirraptor')">Velocirraptor</button>
<button onclick="ApostaDino('Anquilossauro')">Anquilossauro</button>
<button onclick="ApostaDino('Carnotauro')">Carnotauro</button>
<button onclick="ApostaDino('T-Rex')">T-Rex</button>
<button onclick="ApostaDino('Estegossauro')">Estegossauro</button>
<button onclick="ApostaDino('Parassaurolofo')">Parassaurolofo</button>
<button onclick="ApostaDino('Braquiossauro')">Braquiossauro</button>
<button onclick="ApostaDino('Triceratopo')">Triceratopo</button>
<button onclick="ApostaDino('Alossauro')">Alossauro</button>

<h3>RESULTADO!!</h3>

<p>Valor da aposta: R$ <span id="ValorAposta">0.00</span></p>
<p>Seu dino: <span id="DinoApostado">-</span></p>
<p>Dino Sorteado: <span id="DinoSorteado">-</span></p>
<p id="MensagemFinal"></p>

<hr>
<script src="script.js"></script>
</body>
</html>
